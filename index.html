    const { useState, useRef, useCallback, useEffect } = React;

// Load SheetJS from CDN
function useXLSX() {
  const [ready, setReady] = useState(!!window.XLSX);
  useEffect(() => {
    if (window.XLSX) { setReady(true); return; }
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    s.onload = () => setReady(true);
    document.head.appendChild(s);
  }, []);
  return ready;
}

// ── Constants ─────────────────────────────────────────────────────────────────
const CAT_EMOJI = {
  "Power Tools":"🔧","Small Appliances":"🍳","Electronics":"📱",
  "Baby Gear":"🍼","Furniture":"🛋️","Gaming":"🎮",
  "Clothing":"👕","Kitchen":"🥘","Office":"🖨️",
  "Health":"💊","Other":"📦",
};

// ── Helpers ───────────────────────────────────────────────────────────────────
const f$ = n => n==null ? "—" : "$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fP = n => n==null ? "—" : (n*100).toFixed(1)+"%";

function gradeOf(n) {
  if (n>=80) return {g:"A",cls:"sa"};
  if (n>=65) return {g:"B",cls:"sb"};
  if (n>=50) return {g:"C",cls:"sc"};
  if (n>=35) return {g:"D",cls:"sd"};
  return {g:"F",cls:"sf"};
}
const dColor = d => d>=7?"#3ecf6e":d>=4?"#f5a623":"#e05252";

function mpTag(mp="") {
  const m=mp.toLowerCase();
  if (m.includes("facebook")&&m.includes("ebay")) return {cls:"tof",label:"eBay + FB"};
  if (m.includes("facebook")) return {cls:"tfb",label:"FB Marketplace"};
  if (m.includes("ebay"))     return {cls:"teb",label:"eBay"};
  if (m.includes("flea")||m.includes("swap")) return {cls:"tfm",label:"Flea Market"};
  if (m.includes("amazon"))   return {cls:"taz",label:"Amazon"};
  return {cls:"tof",label:mp||"eBay"};
}
function riskOf(r="medium") {
  const v=r.toLowerCase();
  if (v==="low")  return {cls:"rlo",label:"Low"};
  if (v==="high") return {cls:"rhi",label:"High"};
  return {cls:"rme",label:"Medium"};
}

function normalizeCondition(raw) {
  if (!raw) return "";
  const s = raw.toLowerCase().replace(/_/g," ").trim();
  if (s.includes("new")) return "New";
  if (s.includes("open")) return "Open Box";
  if (s.includes("like new")||s.includes("excellent")) return "Like New";
  if (s.includes("good")) return "Used - Good";
  if (s.includes("fair")||s.includes("acceptable")) return "Used - Fair";
  if (s.includes("poor")||s.includes("damaged")||s.includes("brok")) return "Damaged";
  if (s.includes("refurb")) return "Refurbished";
  if (s.includes("used")) return "Used";
  return raw.trim();
}

function parseSheet(data) {
  if (!data||data.length<2) return {items:[], lotId:""};
  let hi=0;
  while (hi<data.length&&data[hi].every(c=>!c)) hi++;
  const headers=data[hi].map(h=>String(h||"").toLowerCase().trim());

  // Score each column for likelihood of being the item name
  // Higher = better match. Penalize columns that are clearly NOT names.
  const nameScore = (h) => {
    if (h==="item #"||h==="item#"||h==="item no"||h==="item number"||h==="sku"||h==="upc"||h==="asin") return -1;
    if (h.includes("description")||h.includes("item desc")||h.includes("product name")||h.includes("item name")) return 10;
    if (h.includes("title")) return 8;
    if (h.includes("product")) return 6;
    if (h.includes("name")) return 5;
    if (h==="item") return 3;
    if (h.includes("item")) return 1;
    return 0;
  };
  let ni=-1, bestScore=-99;
  headers.forEach((h,i)=>{ const sc=nameScore(h); if(sc>bestScore){bestScore=sc;ni=i;} });
  if (bestScore<0) ni=-1;

  // Qty — prefer exact "qty" over "units" (units can be a price unit label)
  const find=(...keys)=>headers.findIndex(h=>keys.some(k=>h===k||h.includes(k)));
  const findExact=(...keys)=>headers.findIndex(h=>keys.some(k=>h===k));
  let qi = findExact("qty","quantity","count","pcs");
  if (qi<0) qi = find("qty","quantity","count","units","pcs");

  // Retail — prefer "unit retail" over "ext retail" / "extended"
  const unitRi = headers.findIndex(h=>h.includes("unit retail")||h.includes("unit price")||h.includes("msrp")||h.includes("suggested retail"));
  const extRi  = headers.findIndex(h=>h.includes("ext")&&h.includes("retail"));
  const genRi  = find("retail","price","value","cost");
  // Pick unit retail > general retail > extended (ext retail is qty*price, we don't want that)
  let ri = unitRi>=0 ? unitRi : (genRi>=0 && genRi!==extRi) ? genRi : extRi;

  const ci = find("cond","grade","status","qual");
  const lotCol = findExact("lot id","lot#","lot number","lot no");

  if (ni<0) return {items:[], lotId:""};

  // Extract lot ID from first data row if column exists
  const firstData = data[hi+1];
  const lotId = (lotCol>=0 && firstData) ? String(firstData[lotCol]||"").trim() : "";

  const items = data.slice(hi+1)
    .filter(row=>row[ni]&&String(row[ni]).trim())
    .map((row,i)=>({
      id:i,
      name:String(row[ni]).trim(),
      qty:Math.max(1,parseInt(row[qi])||1),
      retail:parseFloat(String(row[ri]||"0").replace(/[$,\s]/g,""))||0,
      condition:normalizeCondition(ci>=0?String(row[ci]||""):""),
      category:null,demand:null,resalePct:null,
      marketplace:null,risk:null,notes:null,isAnchor:false,
    }));

  return {items, lotId};
}

function dedupeItems(items) {
  const mergeLog = [];
  const groups = {};
  items.forEach(item => {
    const key = item.name.toLowerCase().trim() + "||" + item.retail;
    if (!groups[key]) groups[key] = [];
    groups[key].push(item);
  });

  const merged = [];
  // Track names that appear with multiple prices (flag only)
  const nameGroups = {};
  items.forEach(item => {
    const n = item.name.toLowerCase().trim();
    if (!nameGroups[n]) nameGroups[n] = new Set();
    nameGroups[n].add(item.retail);
  });

  const seen = new Set();
  items.forEach(item => {
    const key = item.name.toLowerCase().trim() + "||" + item.retail;
    if (seen.has(key)) return;
    seen.add(key);
    const group = groups[key];
    const namePriceConflict = nameGroups[item.name.toLowerCase().trim()].size > 1;

    if (group.length === 1) {
      merged.push(item);
      return;
    }

    if (namePriceConflict) {
      // Same name, different prices elsewhere — flag but don't merge
      mergeLog.push({ type: "flag", name: item.name, count: group.length, retail: item.retail, reason: "price differs across rows" });
      group.forEach(i => merged.push(i));
      return;
    }

    // Merge: sum qty, combine conditions
    const totalQty = group.reduce((s, i) => s + i.qty, 0);
    const conditions = [...new Set(group.map(i => i.condition).filter(Boolean))];
    const combinedCondition = conditions.length === 0 ? "" : conditions.join(" / ");
    const condNote = conditions.length > 1 ? " (conditions varied: " + combinedCondition + ")" : "";

    mergeLog.push({ type: "merge", name: item.name, count: group.length, retail: item.retail, totalQty, condNote });
    merged.push({ ...group[0], qty: totalQty, condition: combinedCondition });
  });

  // Re-index IDs
  merged.forEach((item, i) => item.id = i);
  return { items: merged, mergeLog };
}

function calcScores(items) {
  const ai=items.filter(i=>i.demand!=null);
  const avgDemand=ai.length?ai.reduce((s,i)=>s+i.demand,0)/ai.length:5;
  const anchorCount=items.filter(i=>i.isAnchor).length;
  const rm={low:3,medium:2,high:1};
  const avgRisk=ai.length?ai.reduce((s,i)=>s+(rm[(i.risk||"").toLowerCase()]||2),0)/ai.length:2;
  const totalRevenue=items.reduce((s,i)=>s+(i.retail*(i.resalePct||0.3))*i.qty,0);
  const totalRetail=items.reduce((s,i)=>s+i.retail*i.qty,0);
  const dScore=Math.round((avgDemand/10)*30);
  const aScore=Math.round(Math.min(items.length?anchorCount/items.length*3:0,1)*25);
  const rScore=Math.round(((avgRisk-1)/2)*25);
  const mScore=totalRetail>0?Math.round(Math.min(totalRevenue/totalRetail/0.4,1)*20):10;
  const anchorRevenue=items.filter(i=>i.isAnchor).reduce((s,i)=>s+(i.retail*(i.resalePct||0.3))*i.qty,0);
  const anchorItems=items.filter(i=>i.isAnchor);
  const highRiskCount=items.filter(i=>(i.risk||"").toLowerCase()==="high").length;
  const total=dScore+aScore+rScore+mScore;
  return {
    totalRetail,totalRevenue,anchorRevenue,anchorItems,highRiskCount,
    maxBidSafe:totalRevenue*0.50,
    maxBidAgg:totalRevenue*0.60,
    avgDemand,anchorCount,
    dScore,aScore,rScore,mScore,
    total,
  };
}

// ── Claude API ────────────────────────────────────────────────────────────────
async function analyzeItems(items, apiKey, onProgress) {
  const BATCH = 40; // safe batch size for Haiku
  const batches = [];
  for(let i=0; i<items.length; i+=BATCH) batches.push(items.slice(i,i+BATCH));

  let allResults = [];
  for(let b=0; b<batches.length; b++) {
    const batch = batches[b];
    const offset = b * BATCH;
    const list = batch.map((it,i) =>
      `${offset+i}. "${it.name}" Qty:${it.qty} MSRP:$${it.retail} Cond:"${it.condition||"unknown"}"`
    ).join("\n");

    const prompt = `You are a professional liquidation resale analyst for the US market.
Return ONLY a raw JSON array. No markdown. No backticks. No explanation. Start your response with [ and end with ].

Items (0-indexed, global IDs):
${list}

Each object must have exactly these fields:
{
  "id": <global index number>,
  "category": <"Power Tools"|"Small Appliances"|"Electronics"|"Baby Gear"|"Furniture"|"Gaming"|"Clothing"|"Kitchen"|"Office"|"Health"|"Other">,
  "demand": <integer 1-10>,
  "resale_pct": <float: new=0.42-0.50, open-box=0.28-0.38, used=0.18-0.28, damaged=0.10-0.18>,
  "marketplace": <"Facebook Marketplace"|"eBay"|"eBay + Facebook"|"Flea Market"|"Amazon">,
  "risk": <"low"|"medium"|"high">,
  "is_anchor": <boolean — true if this item could be a top revenue driver>,
  "notes": <specific resale insight — include sales velocity if known (e.g. "~8 sold/day on eBay"), typical price range (e.g. "sells $45-$80 used"), or a concrete warning. Be specific, never generic.>
}`;

    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 8000,
        messages: [{role:"user", content:prompt}],
      }),
    });

    if (!res.ok) {
      const errBody = await res.json().catch(()=>({}));
      throw new Error(`API ${res.status}: ${errBody?.error?.message||'Unknown error'}`);
    }

    const data = await res.json();
    const raw = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
    const cleaned = raw.replace(/\`\`\`json/gi,"").replace(/\`\`\`/g,"").trim();
    const match = cleaned.match(/\[[\s\S]*\]/);
    if (!match) {
      console.error("Batch "+b+" raw response:", raw);
      throw new Error("No JSON in response — raw: "+raw.slice(0,200));
    }
    try {
      const parsed = JSON.parse(match[0]);
      allResults = allResults.concat(parsed);
      if(onProgress) onProgress(20 + ((b+1)/batches.length)*68);
    } catch(e) {
      throw new Error("JSON parse failed on batch "+b+": "+e.message);
    }
  }
  return allResults;
}


// ── eBay Browse API Enrichment ────────────────────────────────────────────────
// ── eBay enrichment via Render proxy ─────────────────────────────────────────
async function enrichWithEbay(items, serverUrl, onProgress) {
  if (!serverUrl) return {};
  const base = serverUrl.replace(/\/$/, '');
  const results = {};
  const CONCURRENCY = 3;
  const chunks = [];
  for (let i = 0; i < items.length; i += CONCURRENCY) chunks.push(items.slice(i, i + CONCURRENCY));

  let done = 0;
  for (const chunk of chunks) {
    await Promise.all(chunk.map(async (item) => {
      try {
        const url = `${base}/ebay/search?q=${encodeURIComponent(item.name)}&condition=${encodeURIComponent(item.condition||'')}&limit=15`;
        const res = await fetch(url, { mode: 'cors' });
        if (res.ok) {
          const d = await res.json();
          console.log('[eBay]', item.name, '->', d);
          if (d.found) results[item.name] = d;
        }
      } catch(e) {
        console.warn('eBay lookup failed for', item.name, e.message);
      }
      done++;
      if (onProgress) onProgress(done / items.length);
    }));
  }
  console.log('[eBay] Final results keys:', Object.keys(results));
  return results;
}

            <g transform="translate(47,-38)">
              <rect width="18" height="18" rx="2" fill="#f5a623" stroke="#ffd060" strokeWidth="1"/>
              <rect width="18" height="3" rx="1" fill="#ffd060"/>

            </g>
          )}

        {/* Warehouse shelves bg */}
        <rect x="0" y="0" width="60" height="110" fill="#1c1f22" opacity="0.5" rx="2"/>
        <rect x="5" y="10" width="50" height="6" rx="1" fill="#2a2d31"/>
        <rect x="5" y="35" width="50" height="6" rx="1" fill="#2a2d31"/>
        <rect x="5" y="60" width="50" height="6" rx="1" fill="#2a2d31"/>
        <rect x="10" y="16" width="12" height="18" rx="1" fill="#f5a623" opacity="0.6"/>
        <rect x="26" y="16" width="12" height="18" rx="1" fill="#e09000" opacity="0.5"/>
        <rect x="10" y="41" width="12" height="18" rx="1" fill="#f5a623" opacity="0.4"/>
        <rect x="26" y="41" width="8"  height="18" rx="1" fill="#f5a623" opacity="0.3"/>

      </svg>

      <div className="prog-track">
        <div className="prog-inner" style={{width:`${progress}%`}}/>
      </div>
      <div className="prog-pct">{progress}%</div>
    </div>
  );
}

function MergeBanner({log}) {
  const [dismissed, setDismissed] = useState(false);
  if (dismissed) return null;
  const merges = log.filter(l => l.type === "merge");
  const flags  = log.filter(l => l.type === "flag");
  return (
    <div style={{background:"#1a1400",border:"1px solid #f5a623",borderRadius:6,padding:"10px 14px",marginBottom:12,fontSize:12,lineHeight:1.6,position:"relative"}}>
      <button onClick={()=>setDismissed(true)} style={{position:"absolute",top:8,right:10,background:"none",border:"none",color:"var(--dim)",cursor:"pointer",fontSize:16,lineHeight:1}}>×</button>
      {merges.length>0&&<>
        <div style={{fontFamily:"var(--disp)",fontWeight:700,fontSize:11,letterSpacing:".06em",color:"var(--amber)",marginBottom:4}}>🔀 DUPLICATE ROWS MERGED</div>
        {merges.map((l,i)=>(
          <div key={i} style={{color:"var(--dim)"}}>
            <span style={{color:"var(--txt)",fontWeight:600}}>{l.name}</span> — {l.count} rows collapsed into 1 · Qty: {l.totalQty}{l.condNote&&<span style={{color:"var(--muted)"}}>{l.condNote}</span>}
          </div>
        ))}
      </>}
      {flags.length>0&&<>
        <div style={{fontFamily:"var(--disp)",fontWeight:700,fontSize:11,letterSpacing:".06em",color:"var(--amber)",marginTop:merges.length?8:0,marginBottom:4}}>⚠ POSSIBLE DUPLICATES — NOT MERGED</div>
        {flags.map((l,i)=>(
          <div key={i} style={{color:"var(--dim)"}}>
            <span style={{color:"var(--txt)",fontWeight:600}}>{l.name}</span> — {l.count} rows with same name but different prices. Review manually.
          </div>
        ))}
      </>}
    </div>
  );
}

function App() {
  const xlsxReady=useXLSX();
  const [view,setView]=useState("manifests");
  const [apiKey,setApiKey]=useState(()=>(localStorage.getItem('palletiq_apikey')||'').trim().replace(/[^\x20-\x7E]/g,''));
  const [ebayServer,setEbayServer]=useState(()=>localStorage.getItem('palletiq_ebayserver')||'https://palletiq-webhook.onrender.com');
  const [showKeyInput,setShowKeyInput]=useState(false);
  const [manifests,setManifests]=useState(()=>{
    try{
      const saved=localStorage.getItem('palletiq_manifests');
      return saved?JSON.parse(saved):[];
    }catch{return [];}
  });
  const [active,setActive]=useState(null);
  const [cmpIds,setCmpIds]=useState([]);
  const [loading,setLoading]=useState(false);
  const [loadMsg,setLoadMsg]=useState("");
  const [progress,setProgress]=useState(0);
  const [drag,setDrag]=useState(false);
  const [err,setErr]=useState(null);
  const [sortCol,setSortCol]=useState(null);
  const [summaryOpen,setSummaryOpen]=useState(true);
  const [highlight,setHighlight]=useState(null);
  const tableRef=useRef(null);
  useEffect(()=>{
    if(!highlight||!tableRef.current) return;
    const row=tableRef.current.querySelector(`[data-id="${highlight.id}"]`);
    if(!row) return;
    const tds=row.querySelectorAll('td');
    tds.forEach(td=>{td.style.transition='none';td.style.background='rgba(245,166,35,0.30)';});
    const t1=setTimeout(()=>{
      tds.forEach(td=>{td.style.transition='background 1.6s ease';td.style.background='';});
    },50);
    return ()=>{clearTimeout(t1);tds.forEach(td=>{td.style.transition='';td.style.background='';});};
  },[highlight]);
  const [sortDir,setSortDir]=useState('desc');
  const fileRef=useRef();
  const stickyRef=useRef();
  const [stickyH,setStickyH]=useState(0);

  // Measure sticky-zone height so table headers can stick below it
  useEffect(()=>{
    if(!stickyRef.current) return;
    const obs=new ResizeObserver(()=>setStickyH(stickyRef.current?.offsetHeight||0));
    obs.observe(stickyRef.current);
    setStickyH(stickyRef.current.offsetHeight);
    return ()=>obs.disconnect();
  },[active,view]);

  useEffect(()=>{
    if(apiKey) localStorage.setItem('palletiq_apikey', apiKey);
  },[apiKey]);

  useEffect(()=>{
    localStorage.setItem('palletiq_ebayserver', ebayServer);
  },[ebayServer]);

  // Persist manifests to localStorage on every change
  useEffect(()=>{
    try{ localStorage.setItem('palletiq_manifests', JSON.stringify(manifests)); }
    catch(e){ console.warn('localStorage save failed:', e); }
  },[manifests]);

  const open=(m)=>{setActive(m);setView("analysis");setSortCol(null);setSummaryOpen(true);setHighlight(null);};
  const updateListingUrl=(id,url)=>{
    setManifests(prev=>prev.map(m=>m.id===id?{...m,listingUrl:url}:m));
    if(active?.id===id) setActive(prev=>({...prev,listingUrl:url}));
  };
  const testKey=async()=>{
    if(!apiKey){alert("No API key entered.");return;}
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key":apiKey,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:10,messages:[{role:"user",content:"Hi"}]})
      });
      const d=await r.json();
      if(r.ok) alert("✅ Key works! API connected successfully.");
      else alert("❌ API error "+r.status+": "+JSON.stringify(d?.error?.message));
    }catch(e){alert("❌ Fetch error: "+e.message);}
  };
  const updateLotId=(id,val)=>{
    setManifests(prev=>prev.map(m=>m.id===id?{...m,lotId:val}:m));
    if(active?.id===id) setActive(prev=>({...prev,lotId:val}));
  };
  const updateAskingPrice=(id,val)=>{
    const n=parseFloat(val)||0;
    setManifests(prev=>prev.map(m=>m.id===id?{...m,askingPrice:n}:m));
    if(active?.id===id) setActive(prev=>({...prev,askingPrice:n}));
  };
  const handleSort=(col)=>{
    if(sortCol===col){setSortDir(d=>d==='asc'?'desc':'asc');}
    else{setSortCol(col);setSortDir('desc');}
  };
  const sortedItems=(items)=>{
    if(!sortCol) return items;
    return [...items].sort((a,b)=>{
      let av,bv;
      if(sortCol==='name'){av=a.name.toLowerCase();bv=b.name.toLowerCase();}
      else if(sortCol==='qty'){av=a.qty;bv=b.qty;}
      else if(sortCol==='retail'){av=a.retail;bv=b.retail;}
      else if(sortCol==='resalePct'){av=a.resalePct;bv=b.resalePct;}
      else if(sortCol==='unitRev'){av=a.retail*a.resalePct;bv=b.retail*b.resalePct;}
      else if(sortCol==='totalRev'){av=a.retail*a.resalePct*a.qty;bv=b.retail*b.resalePct*b.qty;}
      else if(sortCol==='demand'){av=a.demand;bv=b.demand;}
      else if(sortCol==='risk'){const r={low:1,medium:2,high:3};av=r[a.risk]||2;bv=r[b.risk]||2;}
      else if(sortCol==='anchor'){av=a.isAnchor?1:0;bv=b.isAnchor?1:0;}
      else{av=0;bv=0;}
      if(av<bv) return sortDir==='asc'?-1:1;
      if(av>bv) return sortDir==='asc'?1:-1;
      return 0;
    });
  };

  const processFile=useCallback(async(file)=>{
    if (!file||!xlsxReady) return;
    setErr(null);setLoading(true);setProgress(5);setLoadMsg("Reading file…");
    try {
      const ab=await file.arrayBuffer();
      const wb=window.XLSX.read(ab,{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const raw=window.XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      const {items: parsedItems, lotId: sheetLotId} = parseSheet(raw);
      if (!parsedItems.length) throw new Error("Couldn't detect columns. Make sure your file has: Item Name, Qty, and Retail/MSRP price headers.");
      const {items, mergeLog} = dedupeItems(parsedItems);

      setProgress(20);
      setLoadMsg(`Analyzing ${items.length} items with AI…`);
      // Animate progress during AI call
      let prog=20;
      setProgress(20);
      let aiRes=[];
      try { aiRes=await analyzeItems(items, apiKey, (p)=>{prog=p;setProgress(Math.round(p));}); }
      catch(e){ console.warn("AI error:",e.message); setErr("AI analysis failed: "+e.message+" — check your API key and try again."); }

      // ── eBay price enrichment (direct JSONP — no proxy needed) ───────────────
      let ebayData = {};
      if (ebayServer) {
        setProgress(88); setLoadMsg(`Fetching real eBay sold prices for ${items.length} items…`);
        try {
          ebayData = await enrichWithEbay(items, ebayServer, (frac) => {
            setProgress(Math.round(88 + frac * 6));
          });
        } catch(e) { console.warn("eBay enrichment error:", e.message); }
      }

      setProgress(95);setLoadMsg("Building manifest…");

      const condFall=(c="")=>{
        const lc=c.toLowerCase();
        if (lc.includes("new")) return 0.45;
        if (lc.includes("open")) return 0.32;
        if (lc.includes("dam")||lc.includes("brok")) return 0.15;
        return 0.30;
      };

      const enriched=items.map((item,i)=>{
        const ai=aiRes.find(r=>Number(r.id)===i)||{};
        const eb=ebayData[item.name]||null;
        // Use eBay avg price to derive resalePct if available
        const ebayResalePct = eb && item.retail>0 ? Math.min(0.95, eb.avg/item.retail) : null;
        return {
          ...item,
          category:  ai.category   ||"Other",
          demand:    ai.demand     ||5,
          resalePct: ebayResalePct || ai.resale_pct ||condFall(item.condition),
          marketplace:ai.marketplace||"eBay",
          risk:      ai.risk       ||"medium",
          isAnchor:  !!ai.is_anchor,
          notes:     ai.notes      ||"",
          ebayAvg:   eb?.avg||null,
          ebayMin:   eb?.min||null,
          ebayMax:   eb?.max||null,
          ebayCount: eb?.count||0,
        };
      });

      const mf={
        id:Date.now(),
        name:file.name.replace(/\.[^.]+$/,""),
        date:new Date().toLocaleDateString(),
        items:enriched,
        scores:calcScores(enriched),
        listingUrl:"",
        mergeLog,
        askingPrice:0,
        lotId:sheetLotId||"",
      };
      setManifests(prev=>[...prev,mf]);
      setActive(mf);
      setProgress(100);
      await new Promise(r=>setTimeout(r,300));
      setView("analysis");
    } catch(e){
      setErr(e.message);
    } finally {
      setLoading(false);
      setProgress(0);
    }
  },[xlsxReady, apiKey]);

  const onDrop=(e)=>{e.preventDefault();setDrag(false);processFile(e.dataTransfer.files[0]);};
  const toggleCmp=(id)=>setCmpIds(prev=>prev.includes(id)?prev.filter(x=>x!==id):prev.length<2?[...prev,id]:[prev[1],id]);
  const delMf=(id)=>{
    setManifests(prev=>prev.filter(m=>m.id!==id));
    setCmpIds(prev=>prev.filter(x=>x!==id));
    if (active?.id===id){setActive(null);setView("manifests");}
  };
  const cmpPair=manifests.filter(m=>cmpIds.includes(m.id));

  return (
    <>
      <style>{CSS}</style>
      <div className="app">

        {/* Header */}
        <header className="hdr">
          <div className="logo">Pallet<span>IQ</span></div>
          <nav className="nav">
            <button className={`nb ${view==="manifests"?"on":""}`} onClick={()=>setView("manifests")}>Manifests</button>
            {active&&<button className={`nb ${view==="analysis"?"on":""}`} onClick={()=>setView("analysis")}>Analysis</button>}
            {view==="analysis"&&<button className="nb back-btn" onClick={()=>setView("manifests")}>← Back to Manifests</button>}
            {manifests.length>=2&&<button className={`nb ${view==="compare"?"on":""}`} onClick={()=>setView("compare")}>Compare</button>}
          </nav>
        </header>

        {/* API Key bar */}
        {showKeyInput?(
          <div className="apikey-bar">
            <span style={{whiteSpace:"nowrap"}}>🔑 Anthropic API Key:</span>
            <input className="apikey-input" type="password" placeholder="sk-ant-..." value={apiKey} onChange={e=>setApiKey(e.target.value.trim().replace(/[^\x20-\x7E]/g,""))} autoFocus/>
            {apiKey?<span className="apikey-ok" title="Key saved"/>:<span className="apikey-no" title="No key"/>}
            <span style={{color:"var(--muted)",fontSize:11,marginLeft:8,whiteSpace:"nowrap"}}>🛒 eBay Server:</span>
            <input className="apikey-input" type="text" placeholder="https://palletiq-webhook.onrender.com" value={ebayServer} onChange={e=>setEbayServer(e.target.value.trim())}/>
            {ebayServer?<span className="apikey-ok" title="eBay server set"/>:<span className="apikey-no" title="No eBay server"/>}
            <span style={{color:"var(--muted)",fontSize:11}}>Saved to browser.</span>
            <button className="apikey-btn" onClick={()=>setShowKeyInput(false)}>Done</button>
          </div>
        ):(
          <div style={{borderBottom:"1px solid var(--bdr)",padding:"6px 24px",background:"var(--surf)",display:"flex",alignItems:"center",gap:8}}>
            {apiKey
              ? <><span className="apikey-ok"/><span style={{fontSize:11,color:"var(--dim)"}}>Key: {apiKey.slice(0,10)}…{apiKey.slice(-4)}</span></>
              : <><span className="apikey-no"/><span style={{fontSize:11,color:"var(--red)"}}>No API key — analysis won't work</span></>
            }
            <button className="apikey-btn" style={{marginLeft:4}} onClick={()=>setShowKeyInput(true)}>{apiKey?"Change Key":"Add Key"}</button>
            {apiKey&&<button className="apikey-btn" onClick={testKey}>Test Key</button>}
            <span style={{borderLeft:"1px solid var(--bdr)",marginLeft:8,paddingLeft:8}}>
              {ebayServer
                ? <><span className="apikey-ok"/><span style={{fontSize:11,color:"var(--dim)",marginLeft:4}}>eBay: Live</span></>
                : <><span className="apikey-no"/><span style={{fontSize:11,color:"var(--dim)",marginLeft:4}}>eBay: Not configured</span></>
              }
            </span>
          </div>
        )}
        <main className="main">

          {/* ── MANIFESTS ── */}
          {view==="manifests"&&(
            <div style={{overflow:"auto",flex:1,minHeight:0}}>
            <>
              <div className="ph">
                <div>
                  <div className="pt">Manifests</div>
                  <div style={{fontSize:13,color:"var(--dim)",marginTop:4}}>Upload pallet manifests to score, analyze, and compare bids.</div>
                </div>
                {cmpIds.length===2&&<button className="btn bp" onClick={()=>setView("compare")}>Compare Selected →</button>}
              </div>
              {err&&<div className="errbar">⚠ {err}</div>}
              <div
                className={`drop ${drag?"drag":""}`}
                onClick={()=>xlsxReady&&fileRef.current.click()}
                onDragOver={e=>{e.preventDefault();setDrag(true);}}
                onDragLeave={()=>setDrag(false)}
                onDrop={onDrop}
              >
                <div className="drop-ico">📦</div>
                <div className="drop-ttl">{xlsxReady?"Drop manifest here or click to upload":"Loading file parser…"}</div>
                <div className="drop-sub">Accepts .xlsx · .xls · .csv — needs: Item Name, Qty, Retail/MSRP columns</div>
                <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}}
                  onChange={e=>{processFile(e.target.files[0]);e.target.value="";}}/>
              </div>
              {manifests.length===0?(
                <div className="empty">
                  <div className="eico">📋</div>
                  <div className="ettl">No manifests yet</div>
                  <div>Upload your first pallet manifest above.</div>
                </div>
              ):(
                <>
                  {manifests.length>=2&&<div className="stsbar">✓ Click "+ Compare" on two manifests, then hit "Compare Selected →"</div>}
                  <div className="cards">
                    {manifests.map(m=>{
                      const {g,cls}=gradeOf(m.scores.total);
                      return (
                        <div key={m.id} className={`card ${cmpIds.includes(m.id)?"sel":""}`} onClick={()=>open(m)}>
                          <div className={`sbadge ${cls}`}>{m.scores.total}</div>
                          <div className="card-name">{m.name}</div>
                          <div className="card-meta">
                            {m.date} · {m.items.length} items · Grade {g}{m.lotId&&<span style={{marginLeft:6,fontFamily:"var(--mono)",fontSize:11,color:"var(--dim)"}}>· {m.lotId}</span>}{m.askingPrice>0&&<span style={{marginLeft:6,fontFamily:"var(--mono)",fontSize:11,color:"var(--dim)"}}>· Ask: {f$(m.askingPrice)}</span>}
                            {m.listingUrl&&<span style={{marginLeft:8}}><a href={m.listingUrl} target="_blank" rel="noopener noreferrer" style={{color:"var(--amber)",fontSize:11,fontFamily:"var(--mono)"}} onClick={e=>e.stopPropagation()}>↗ listing</a></span>}
                          </div>
                          <div className="cstats">
                            <div className="cstat"><div className="cstat-l">Est. Revenue</div><div className="cstat-v g">{f$(m.scores.totalRevenue)}</div></div>
                            <div className="cstat"><div className="cstat-l">Safe Max Bid</div><div className="cstat-v a">{f$(m.scores.maxBidSafe)}</div></div>
                            <div className="cstat"><div className="cstat-l">Total MSRP</div><div className="cstat-v">{f$(m.scores.totalRetail)}</div></div>
                            <div className="cstat"><div className="cstat-l">Anchor Items</div><div className="cstat-v">{m.scores.anchorCount}</div></div>
                          </div>
                          <div className="acts" onClick={e=>e.stopPropagation()}>
                            <button className="btn bg" style={{fontSize:11,padding:"5px 12px"}} onClick={()=>toggleCmp(m.id)}>
                              {cmpIds.includes(m.id)?"✓ In Compare":"+ Compare"}
                            </button>
                            <button className="btn bd" onClick={()=>delMf(m.id)}>Delete</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </>
              )}
            </>
            </div>
          )}

          {/* ── ANALYSIS ── */}
          {view==="analysis"&&active&&(()=>{
            const m=active,s=m.scores;
            const {g}=gradeOf(s.total);
            const gc=s.total>=75?"var(--green)":s.total>=50?"var(--amber)":"var(--red)";
            return (
              <div className="analysis-wrap" ref={tableRef}>
                <div className="ph" style={{marginBottom:8,paddingBottom:8,borderBottom:"1px solid var(--bdr)"}}>
                    <div>
                      <div className="pt">{m.name}<span>· Analysis</span></div>
                      <div style={{fontSize:12,color:"var(--dim)",marginTop:4}}>{m.date} · {m.items.length} items{m.lotId&&<span style={{marginLeft:8,fontFamily:"var(--mono)",color:"var(--amber)"}}>Lot: {m.lotId}</span>}</div>
                    </div>
                    <button className="btn bg" onClick={()=>shareReport(m)}>📥 Download PDF</button>
                  </div>

                  {/* Dedupe Banner */}
                {m.mergeLog&&m.mergeLog.length>0&&<MergeBanner log={m.mergeLog}/>}

                  {/* Summary Panel */}
                {(()=>{
                  const ask=active.askingPrice||0;
                  const anchRev=s.anchorRevenue||0;
                  const anchPct=s.totalRevenue>0?Math.round((anchRev/s.totalRevenue)*100):0;
                  let badge,headline,reason,badgeCls;
                  if(s.total>=75&&s.avgDemand>=6&&s.highRiskCount<=3){
                    badge="STRONG BUY";badgeCls="buy";
                    headline="This pallet is worth pursuing aggressively.";
                    reason="High demand ("+s.avgDemand.toFixed(1)+"/10 avg), "+s.anchorCount+" anchor item"+(s.anchorCount!==1?"s":"")+" covering "+anchPct+"% of revenue, and low overall risk. Anchor items alone should generate "+f$(anchRev)+".";
                  } else if(s.total>=65){
                    badge="GOOD BUY";badgeCls="buy";
                    headline="Solid pallet with room for profit.";
                    reason="Score of "+s.total+"/100 with "+s.anchorCount+" anchor item"+(s.anchorCount!==1?"s":"")+" generating "+f$(anchRev)+". Watch the "+s.highRiskCount+" high-risk item"+(s.highRiskCount!==1?"s":"")+" — price those conservatively or bundle them.";
                  } else if(s.total>=50){
                    badge="PROCEED WITH CAUTION";badgeCls="caution";
                    headline="Could work, but negotiate hard on price.";
                    reason="Average demand and "+s.highRiskCount+" high-risk item"+(s.highRiskCount!==1?"s":"")+" reduce confidence. Anchor items cover "+f$(anchRev)+" ("+anchPct+"% of revenue). Only bid at or below "+f$(s.maxBidSafe)+".";
                  } else if(s.total>=35){
                    badge="HIGH RISK";badgeCls="caution";
                    headline="Weak pallet — only buy at a deep discount.";
                    reason="Low demand and "+s.highRiskCount+" high-risk item"+(s.highRiskCount!==1?"s":"")+" make this tough to flip. Don't pay more than "+f$(s.maxBidSafe*0.7)+" — you need extra margin to absorb losses.";
                  } else {
                    badge="WALK AWAY";badgeCls="pass";
                    headline="This pallet is not worth bidding on.";
                    reason="Score of "+s.total+"/100 reflects poor demand, high risk, and weak anchor coverage. Estimated revenue of "+f$(s.totalRevenue)+" leaves almost no room for profit.";
                  }
                  if(ask>0&&ask>s.maxBidAgg){badge="WALK AWAY";badgeCls="pass";headline="Asking price is too high.";reason="At "+f$(ask)+", you'd be paying "+Math.round((ask/s.totalRevenue)*100)+"% of estimated revenue — well above the 60% aggressive ceiling of "+f$(s.maxBidAgg)+".";}
                  return (
                    <div className="summary-panel">
                      <div className="summary-verdict">
                        <div className={`verdict-badge ${badgeCls}`}>{badge}</div>
                        <div className="verdict-text">
                          <div className="verdict-headline">{headline}</div>
                          <div className="verdict-reason">{reason}</div>
                        </div>
                        
                      </div>
                      {s.anchorItems&&s.anchorItems.length>0?(
                        <div style={{marginTop:16,paddingTop:16,borderTop:"1px solid var(--bdr)"}}>
                          <div className="anchor-summary" style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                            <span>⭐ <strong>{s.anchorCount} anchor item{s.anchorCount!==1?"s":""}</strong> projected to generate <strong style={{color:"var(--green)"}}>{f$(anchRev)}</strong> — {anchPct}% of total estimated revenue</span>
                            <button onClick={()=>setSummaryOpen(o=>!o)} style={{background:"var(--amber)",border:"none",color:"#000",borderRadius:4,width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:18,lineHeight:1,flexShrink:0,fontWeight:700,boxShadow:"0 0 0 2px rgba(245,166,35,.3)"}}>{summaryOpen?"−":"+"}</button>
                          </div>
                          {summaryOpen&&<div className="anchor-grid">
                            {s.anchorItems.map((item,idx)=>{
                              const rev=item.retail*(item.resalePct||0.3)*item.qty;
                              return (
                                <div className="anchor-tile" key={idx} style={{cursor:"pointer"}} onClick={()=>{
                                  const globalId=m.items.findIndex(it=>it.name===item.name&&it.isAnchor);
                                  setHighlight(null);
                                  requestAnimationFrame(()=>{
                                    setHighlight({id:globalId,tick:Date.now()});
                                    setTimeout(()=>{
                                      const el=tableRef.current&&tableRef.current.querySelector(`[data-id="${globalId}"]`);
                                      if(el)el.scrollIntoView({behavior:"smooth",block:"center"});
                                    },50);
                                    setTimeout(()=>setHighlight(null),2200);
                                  });
                                }}>
                                  <div className="anchor-tile-name">{item.name}</div>
                                  <div className="anchor-tile-rev">{f$(rev)}</div>
                                  <div className="anchor-tile-meta">Qty {item.qty} · MSRP {f$(item.retail)} · {Math.round((item.resalePct||0.3)*100)}% resale · {item.marketplace}</div>
                                </div>
                              );
                            })}
                          </div>}
                        </div>
                      ):(
                        <div style={{marginTop:16,paddingTop:16,borderTop:"1px solid var(--bdr)",display:"flex",alignItems:"center",gap:14}}>
                          <span style={{fontSize:32,lineHeight:1}}>📦</span>
                          <div>
                            <div style={{fontFamily:"var(--disp)",fontWeight:700,fontSize:12,color:"var(--dim)",letterSpacing:".06em",marginBottom:4}}>NO ANCHOR ITEMS IDENTIFIED</div>
                            <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.6}}>The AI didn't find any standout revenue drivers in this manifest. Revenue will depend on volume — sell in bundles or lots rather than individually, and negotiate the asking price down hard.</div>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })()}

                {/* Lot ID + Asking Price + Listing URL bar */}
                  <div className="asking-bar" style={{marginBottom:12}}>
                    <div className="asking-field">
                      <span className="asking-label">🏷 Lot ID</span>
                      <div className="listing-dot"/>
                      <input className="asking-input" type="text" placeholder="e.g. LOT-00421"
                        style={{width:120,fontSize:13,fontWeight:400}}
                        value={active.lotId||""}
                        onChange={e=>updateLotId(active.id,e.target.value)}/>
                    </div>
                    <div className="asking-divider"/>
                    <div className="asking-field">
                      <span className="asking-label">💰 Asking Price</span>
                      <div className="listing-dot"/>
                      <span className="asking-prefix">$</span>
                      <input className="asking-input" type="number" placeholder="0.00"
                        value={active.askingPrice||""}
                        onChange={e=>updateAskingPrice(active.id,e.target.value)}/>
                    </div>
                    {active.askingPrice>0&&(()=>{
                      const ask=active.askingPrice,safe=s.maxBidSafe,agg=s.maxBidAgg,diff=safe-ask,pct=Math.round((ask/s.totalRevenue)*100);
                      if(ask<=safe) return (<><div className="asking-divider"/><div className="asking-verdict"><span className="verdict-good">✓ Strong Buy</span><span className="verdict-sub">You're {f$(diff)} under your safe max · paying {pct}% of est. revenue</span></div></>);
                      if(ask<=agg)  return (<><div className="asking-divider"/><div className="asking-verdict"><span className="verdict-warn">⚠ Proceed with Caution</span><span className="verdict-sub">Above safe bid by {f$(Math.abs(diff))} · paying {pct}% of est. revenue</span></div></>);
                      return (<><div className="asking-divider"/><div className="asking-verdict"><span className="verdict-bad">✗ Walk Away</span><span className="verdict-sub">Overpaying by {f$(Math.abs(diff))} · paying {pct}% of est. revenue</span></div></>);
                    })()}
                    <div className="asking-divider"/>
                    <div className="asking-field" style={{flex:1}}>
                      <span className="asking-label">🔗 URL</span>
                      <div className="listing-dot"/>
                      <input className="listing-input" placeholder="Paste listing link…"
                        value={active.listingUrl||""}
                        onChange={e=>updateListingUrl(active.id,e.target.value)}/>
                      {active.listingUrl&&<a className="listing-link" href={active.listingUrl} target="_blank" rel="noopener noreferrer">Open ↗</a>}
                    </div>
                  </div>

                {/* Sticky top zone: summary bar + score breakdown only */}
                <div className="sticky-zone" ref={stickyRef}>
                  <div className="sbar">
                    <div className="si"><div className="sl"><span className="tip-wrap">Total MSRP<Tip text="The combined retail value of every item in the pallet if sold brand new. Ignore this number — it's almost never realistic."/></span></div><div className="sv">{f$(s.totalRetail)}</div></div>
                    <div className="sdiv"/>
                    <div className="si"><div className="sl"><span className="tip-wrap">Est. Revenue<Tip text="What you'd realistically make selling everything in this pallet based on condition and market demand."/></span></div><div className="sv g">{f$(s.totalRevenue)}</div></div>
                    <div className="sdiv"/>
                    <div className="si"><div className="sl"><span className="tip-wrap">Safe Max Bid<Tip text="The most you should pay at auction — 50% of estimated revenue. This leaves room for unsellable items, fees, and slow movers."/></span></div><div className="sv a">{f$(s.maxBidSafe)}</div></div>
                    <div className="si"><div className="sl"><span className="tip-wrap">Aggressive Bid<Tip text="A higher ceiling if you're confident in the pallet quality — 60% of estimated revenue. Only go here if you have strong anchor items and low risk scores."/></span></div><div className="sv b">{f$(s.maxBidAgg)}</div></div>
                    <div className="sdiv"/>
                    <div className="si">
                      <div className="sl"><span className="tip-wrap">Manifest Score<Tip text="Overall pallet quality from 0–100 based on demand, anchor item density, risk, and margin potential. A = great buy, F = walk away."/></span></div>
                      <div style={{display:"flex",alignItems:"baseline",gap:8}}>
                        <div className="sv" style={{color:gc,fontSize:28,lineHeight:1}}>{s.total}</div>
                        <div style={{color:gc,fontFamily:"var(--disp)",fontSize:22,fontWeight:800}}>{g}</div>
                      </div>
                    </div>
                    <div className="si"><div className="sl"><span className="tip-wrap">Anchor Items<Tip text="The high-value products that justify buying the pallet. A good pallet has at least 3–5 anchor items to absorb the cost of slower movers."/></span></div><div className="sv">{s.anchorCount} / {m.items.length}</div></div>
                  </div>

                  {/* Score breakdown */}
                  <div className="spanel">
                    <div className="spanel-ttl">Score Breakdown — {s.total} / 100</div>
                    <div className="sgrid">
                      {[
                        {label:"Demand Quality",   val:s.dScore,max:30,tip:"Average demand score across all items. High = most items sell quickly. Low = slow-moving inventory that could sit for weeks."},
                        {label:"Anchor Density",   val:s.aScore,max:25,tip:"How many high-value anchor items are in this pallet. Anchors justify the purchase price and absorb the cost of weaker items."},
                        {label:"Risk Profile",     val:s.rScore,max:25,tip:"Weighted risk across all items. A good pallet has mostly low and medium risk — high risk items are damaged or hard to price."},
                        {label:"Margin Potential", val:s.mScore,max:20,tip:"How well this pallet's estimated revenue compares to retail value. Benchmark is 40% of MSRP — higher is better."},
                      ].map(sc=>(
                        <div className="sitem" key={sc.label}>
                          <div className="sitem-l"><span className="tip-wrap">{sc.label}<Tip text={sc.tip}/></span><span style={{float:"right"}}>{sc.max}pts</span></div>
                          <div className="sbar2"><div className="sfill" style={{width:`${(sc.val/sc.max)*100}%`}}/></div>
                          <div className="sitem-v">{sc.val}pts</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>{/* end sticky-zone */}

                {/* Scrollable table */}
                <div className="twrap">
                  <style>{`.twrap thead th { top: ${stickyH}px; }`}</style>
                  <table>
                    <thead>
                      <tr>
                        <th className={`sortable${sortCol==='anchor'?' sorted':''}`} onClick={()=>handleSort('anchor')}><span className="tip-wrap">⭐{sortCol==='anchor'?(sortDir==='desc'?' ↓':' ↑'):' ↕'}<Tip text="Anchor items are the high-value products that make a pallet worth buying. Sort to see your biggest opportunities first."/></span></th>
                        <th>Img</th>
                        <th className={`sortable${sortCol==='name'?' sorted':''}`} onClick={()=>handleSort('name')}><span className="tip-wrap">Item{sortCol==='name'?(sortDir==='desc'?' ↓':' ↑'):' ↕'}<Tip text="The product name from your manifest. Click to sort A–Z or Z–A."/></span></th>
                        <th className={`sortable${sortCol==='qty'?' sorted':''}`} onClick={()=>handleSort('qty')}><span className="tip-wrap">Qty{sortCol==='qty'?(sortDir==='desc'?' ↓':' ↑'):' ↕'}<Tip text="How many units of this item are in the pallet."/></span></th>
                        <th style={{width:70,minWidth:60}}><span className="tip-wrap">Cond<Tip text="Item condition as listed in the manifest."/></span></th>
                        <th className={`sortable${sortCol==='retail'?' sorted':''}`} onClick={()=>handleSort('retail')}><span className="tip-wrap">MSRP{sortCol==='retail'?(sortDir==='desc'?' ↓':' ↑'):' ↕'}<Tip text="Manufacturer's Suggested Retail Price — what this sells for brand new in a store. Not what you'll get."/></span></th>
                        <th><span className="tip-wrap" style={{color:"var(--amber)"}}>eBay Avg<Tip text="Average price from recently SOLD eBay listings for this item and condition. This is what buyers actually paid — not asking prices."/></span></th>
                        <th className={`sortable${sortCol==='resalePct'?' sorted':''}`} onClick={()=>handleSort('resalePct')}><span className="tip-wrap">Resale %{sortCol==='resalePct'?(sortDir==='desc'?' ↓':' ↑'):' ↕'}<Tip text="The realistic fraction of MSRP you'll actually sell it for, based on condition and demand."/></span></th>
                        <th className={`sortable${sortCol==='unitRev'?' sorted':''}`} onClick={()=>handleSort('unitRev')}><span className="tip-wrap">Unit Rev.{sortCol==='unitRev'?(sortDir==='desc'?' ↓':' ↑'):' ↕'}<Tip text="What you'll realistically pocket per unit after selling it — MSRP × Resale %."/></span></th>
                        <th className={`sortable${sortCol==='totalRev'?' sorted':''}`} onClick={()=>handleSort('totalRev')}><span className="tip-wrap">Total Rev.{sortCol==='totalRev'?(sortDir==='desc'?' ↓':' ↑'):' ↕'}<Tip text="Unit revenue × quantity. Your expected gross from all units of this item."/></span></th>
                        <th className={`sortable${sortCol==='demand'?' sorted':''}`} onClick={()=>handleSort('demand')}><span className="tip-wrap">Demand{sortCol==='demand'?(sortDir==='desc'?' ↓':' ↑'):' ↕'}<Tip text="How fast this typically sells on the resale market. 10 = sells same day. 1 = could sit for months."/></span></th>
                        <th><span className="tip-wrap">Marketplace<Tip text="The best platform to sell this item. FB Marketplace = local pickup, no fees. eBay = ships nationwide. Flea Market = offload slow movers cheap."/></span></th>
                        <th className={`sortable${sortCol==='risk'?' sorted':''}`} onClick={()=>handleSort('risk')}><span className="tip-wrap">Risk{sortCol==='risk'?(sortDir==='desc'?' ↓':' ↑'):' ↕'}<Tip text="Overall risk rating for this item. High risk = damaged, slow-moving, or hard to price. Low risk = clean, fast seller."/></span></th>
                        <th><span className="tip-wrap">Notes<Tip text="A practical tip or warning from the AI about this specific item — recalls, pricing traps, or resale advice."/></span></th>
                      </tr>
                    </thead>
                    <tbody>
                      {sortedItems(m.items).map(item=>{
                        const uRev=item.retail*item.resalePct;
                        const tRev=uRev*item.qty;
                        const mp=mpTag(item.marketplace);
                        const rk=riskOf(item.risk);
                        return (
                          <tr key={item.id} data-id={item.id}>
                            <td style={{width:28}}>{item.isAnchor?"⭐":""}</td>
                            <td style={{width:60}}>
                              <ProductImage name={item.name} category={item.category}/>
                            </td>
                            <td><div className="iname">{item.name}</div></td>
                            <td><span className="mono" style={{color:"var(--dim)"}}>{item.qty}</span></td>
                            <td style={{width:70}}><span style={{fontSize:10,fontWeight:600,letterSpacing:".04em",textTransform:"uppercase",color:"var(--dim)"}}>{item.condition||"—"}</span></td>
                            <td><span className="mono">{f$(item.retail)}</span></td>
                            <td>
                              {item.ebayAvg
                                ? <span className="mono" style={{color:"var(--amber)",fontWeight:600}}>{f$(item.ebayAvg)}<span style={{fontSize:9,color:"var(--dim)",marginLeft:3}}>{item.ebayCount} listings</span></span>
                                : <span style={{fontSize:10,color:"var(--muted)"}}>—</span>
                              }
                            </td>
                            <td><span className="mono" style={{color:"var(--amber)"}}>{fP(item.resalePct)}</span></td>
                            <td><span className="mono">{f$(uRev)}</span></td>
                            <td><span className="mono" style={{color:"var(--green)",fontWeight:600}}>{f$(tRev)}</span></td>
                            <td>
                              <div className="dbar">
                                <div className="dbg"><div className="dbf" style={{width:`${item.demand*10}%`,background:dColor(item.demand)}}/></div>
                                <span style={{fontSize:11,color:"var(--dim)",fontFamily:"var(--mono)"}}>{item.demand}/10</span>
                              </div>
                            </td>
                            <td><span className={`tag ${mp.cls}`}>{mp.label}</span></td>
                            <td><span className={`risk ${rk.cls}`}>{rk.label}</span></td>
                            <td><div className="notecell">{item.notes}</div></td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>{/* end twrap */}
              </div>
            );
          })()}

          {/* ── COMPARE ── */}
          {view==="compare"&&(
            <div style={{overflow:"auto",flex:1,minHeight:0}}>
              <div className="ph" style={{marginBottom:20}}>
                <div className="pt">Side-by-Side Comparison</div>
              </div>
              {cmpPair.length===2?(()=>{
                const [a,b]=cmpPair;
                const rows=[
                  {label:"Manifest Score",       va:a.scores.total,        vb:b.scores.total,        fmt:v=>v+" / 100",hi:true},
                  {label:"Total MSRP",           va:a.scores.totalRetail,  vb:b.scores.totalRetail,  fmt:f$,           hi:true},
                  {label:"Est. Revenue",         va:a.scores.totalRevenue, vb:b.scores.totalRevenue, fmt:f$,           hi:true},
                  {label:"Safe Max Bid (50%)",   va:a.scores.maxBidSafe,   vb:b.scores.maxBidSafe,   fmt:f$,           hi:false},
                  {label:"Aggressive Bid (60%)", va:a.scores.maxBidAgg,    vb:b.scores.maxBidAgg,    fmt:f$,           hi:false},
                  {label:"Avg Demand",           va:a.scores.avgDemand,    vb:b.scores.avgDemand,    fmt:v=>Number(v).toFixed(1)+" / 10",hi:true},
                  {label:"Anchor Items",         va:a.scores.anchorCount,  vb:b.scores.anchorCount,  fmt:v=>v+" items",hi:true},
                  {label:"Total Items",          va:a.items.length,        vb:b.items.length,        fmt:v=>v+" items",hi:false},
                ];
                return (
                  <div className="cgrid">
                    {[a,b].map((m,idx)=>{
                      const {g}=gradeOf(m.scores.total);
                      return (
                        <div className="ccard" key={m.id}>
                          <div className="chead">
                            <div className="cname">{m.name}</div>
                            <div style={{fontSize:12,color:"var(--dim)",marginTop:2}}>{m.date} · {m.items.length} items · Grade {g}</div>
                          </div>
                          {rows.map(r=>{
                            const myV=idx===0?r.va:r.vb;
                            const otV=idx===0?r.vb:r.va;
                            const better=r.hi?myV>otV:myV<otV;
                            return (
                              <div className="crow" key={r.label}>
                                <div className="crow-l">{r.label}</div>
                                <div className={`crow-v ${better?"win":"lose"}`}>{better?"✓ ":""}{r.fmt(myV)}</div>
                              </div>
                            );
                          })}
                          <div style={{padding:"12px 16px"}}>
                            <button className="btn bp" style={{width:"100%"}} onClick={()=>open(m)}>View Full Analysis →</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })():(
                <div className="empty">
                  <div className="eico">⚖️</div>
                  <div className="ettl">Select 2 Manifests to Compare</div>
                  <div>Go to Manifests and click "+ Compare" on two pallets.</div>
                  <button className="btn bp" style={{marginTop:16}} onClick={()=>setView("manifests")}>← Go to Manifests</button>
                </div>
              )}
            </div>
          )}
        </main>

      </div>

      {loading&&(
        <div className="lov">
          <ForkliftScene progress={progress}/>
        </div>
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
</html>
